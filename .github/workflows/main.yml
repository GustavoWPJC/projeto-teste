name: Testes Automatizados

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando os arquivos do repositório
        uses: actions/checkout@v4

      - name: Instalando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalando o Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Rodando os testes da Petstore
        run: |
          newman run petstore-collection.json \
            --environment petstore-environment.json \
            --insecure \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export report.html

      - name: Salvando o relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report
          path: report.html

  run-web-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Baixando os arquivos do repositório
        uses: actions/checkout@v4

      - name: Instalando o Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalando as dependências
        working-directory: web-tests
        run: pip install -r requirements.txt

      - name: Instalando o Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Criando o arquivo .env
        run: |
          echo "LOGIN_USER=${{ secrets.LOGIN_USER }}" >> web-tests/.env
          echo "LOGIN_PASSWORD=${{ secrets.LOGIN_PASSWORD }}" >> web-tests/.env

      - name: Rodando os testes Selenium
        working-directory: web-tests
        run: pytest

      - name: Salvando screenshot de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-debug
          path: screenshot.png

      - name: Salvando o relatório
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-test-report
          path: web-tests/report.html